<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1600"/>
<title>spidj — graph view wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --paper:    #f4efe6;
  --paper-1:  #ece5d6;
  --paper-2:  #e2dac8;
  --paper-3:  #d6cdb8;
  --ink-1:    #1a1714;
  --ink-2:    #3a342c;
  --ink-3:    #6a6258;
  --ink-mute: #9a9286;
  --accent:   #c8302e;
  --accent-stroke: #9b1f1d;
  --accent-soft: rgba(200,48,46,0.10);

  --font-hand: "Kalam", "Caveat", system-ui, sans-serif;
  --font-sketch: "Architects Daughter", "Kalam", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "Menlo", monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--paper);
  color: var(--ink-1);
  font-family: var(--font-hand);
  /* paper texture via gradients */
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.025), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.03), transparent 60%),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0 1px, transparent 1px 6px);
  min-height: 100vh;
}

button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; color: var(--ink-1); }

.hand { font-family: var(--font-hand); }
.mono { font-family: var(--font-mono); font-size: 0.85em; letter-spacing: -0.02em; }
.muted { color: var(--ink-3); }
.small { font-size: 0.82em; }
.big { font-size: 1.4em; }
.dot { opacity: 0.4; margin: 0 4px; }

/* ─── App layout ──────────────────────────────────────── */
.app {
  min-width: 1280px;
  padding: 16px 22px 80px;
}
.app-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 6px 4px 14px;
  gap: 18px;
}
.brand { display: flex; align-items: baseline; gap: 8px; font-size: 22px; }
.brand-mark { color: var(--accent); font-size: 26px; line-height: 1; }
.brand-name { font-weight: 700; letter-spacing: 0.02em; }
.brand-tag { font-size: 14px; }

/* ─── Demo pills ──────────────────────────────────────── */
.demo-pills {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px;
  border: 1.5px dashed var(--accent);
  background: var(--accent-soft);
  border-radius: 6px;
  transform: rotate(-0.4deg);
  flex-shrink: 0;
}
.demo-pills-label { color: var(--accent-stroke); font-weight: 700; white-space: nowrap; }
.demo-marker { display: inline-block; transform: rotate(8deg); margin-right: 4px; }
.demo-pills-row { display: flex; gap: 6px; flex-wrap: nowrap; }
.demo-pill {
  font-size: 14px;
  background: var(--paper);
  border: 1.5px solid var(--ink-2);
  border-radius: 18px / 12px;
  padding: 3px 11px;
  color: var(--ink-1);
  white-space: nowrap;
}
.demo-pill.on { background: var(--accent); color: white; border-color: var(--accent-stroke); }

/* ─── Sketch box (wobbly hand-drawn border) ──────────── */
.sketch-box {
  position: relative;
  background: var(--paper-1);
  border-radius: 10px 6px 12px 5px / 5px 12px 6px 10px;
}
.sketch-box .sketch-border {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}
.sketch-box .sketch-border rect {
  fill: none;
  stroke: var(--ink-1);
  stroke-width: 1.6;
  stroke-linejoin: round;
  rx: 8; ry: 8;
  /* irregular dash shimmer suggests handdrawn */
}
.sketch-box.dashed .sketch-border rect {
  stroke-dasharray: 5 5;
}
.sketch-box.accent .sketch-border rect {
  stroke: var(--accent-stroke);
  stroke-width: 2.2;
}
.sketch-content { position: relative; padding: 10px 12px; }

/* ─── Variants column (one full-width row per layout) ── */
.variants-row {
  display: flex;
  flex-direction: column;
  gap: 22px;
  align-items: stretch;
}
.variant-frame { display: flex; flex-direction: column; gap: 8px; }
.variant-head {
  padding: 0 4px;
  display: flex; align-items: baseline; gap: 14px;
  border-bottom: 1.4px dashed var(--ink-3);
  padding-bottom: 6px;
}
.variant-title { font-size: 22px; font-weight: 700; }
.variant-desc { font-size: 13px; }
.frame-shell { background: var(--paper-1); }

/* ─── Deck stack (vertical) ──────────────────────────── */
.deck-row { display: flex; flex-direction: column; gap: 8px; padding: 4px 0 0; }
.deck-divider { display: none; }
.deck { cursor: pointer; }
.deck-box { background: var(--paper-2); }
.deck.is-anchor-src .sketch-border rect {
  stroke: var(--accent); stroke-width: 2.6;
}
.deck.drop-over .sketch-border rect { stroke: var(--accent); stroke-dasharray: 4 4; }
.deck-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.deck-label { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: var(--ink-3); }
.live-pill { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }
.cued-pill { font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em; }
.deck-empty {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 0; color: var(--ink-mute);
}
.deck-body { display: grid; grid-template-columns: 76px 1fr; gap: 8px; align-items: center; padding: 4px 0 0; }
.platter {
  position: relative; width: 72px; height: 72px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--paper), var(--paper-3));
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--ink-2);
}
.platter > .art-block { border-radius: 50%; clip-path: circle(50% at 50% 50%); }
.platter-ring {
  position: absolute; inset: 0; color: var(--ink-2);
  pointer-events: none;
}
.platter.spinning .platter-ring { animation: spin 4.2s linear infinite; transform-origin: 50% 50%; }
.platter.spinning {
  box-shadow:
    0 0 0 2px var(--accent),
    0 0 18px var(--accent-soft),
    0 0 4px var(--accent-soft);
}
@keyframes spin { to { transform: rotate(360deg); } }

.deck-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.deck-meta .title { font-size: 16px; font-weight: 700; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deck-numbers { font-size: 11px; color: var(--ink-2); }
.transport { display: flex; gap: 4px; align-items: center; margin-top: 4px; }
.t-btn {
  font-size: 11px; padding: 2px 7px;
  background: var(--paper);
  border: 1.4px solid var(--ink-2);
  border-radius: 16px / 8px;
  color: var(--ink-1);
}
.t-btn.primary { background: var(--accent); color: white; border-color: var(--accent-stroke); }
.pitch { font-size: 10px; margin-left: auto; color: var(--ink-3); }

/* ─── Waveform ────────────────────────────────────────── */
.waveform {
  position: relative;
  display: flex; align-items: center; gap: 1px;
  height: 28px; padding: 2px 4px;
  border-bottom: 1.4px solid var(--ink-2);
  margin-bottom: 6px;
}
.wf-bar { flex: 1; background: var(--ink-2); border-radius: 1px; }
.wf-playhead {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-soft);
}

/* ─── Tab strip ───────────────────────────────────────── */
.tab-strip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 4px 4px;
  border-bottom: 1.6px dashed var(--ink-2);
  margin: 4px 0 8px;
}
.tab {
  padding: 3px 12px;
  font-size: 14px;
  border-radius: 14px / 8px;
  border: 1.4px solid transparent;
}
.tab.active {
  border-color: var(--ink-1);
  background: var(--paper);
  font-weight: 700;
  position: relative;
}
.tab.active::after {
  content: ""; position: absolute; left: 8px; right: 8px; bottom: -7px;
  height: 2px; background: var(--accent); border-radius: 2px;
}
.tab.disabled { color: var(--ink-mute); border-color: var(--paper-3); border-style: dashed; cursor: not-allowed; }
.tab-spacer { flex: 1; }
.tab-note { font-size: 12px; }

/* ─── Frame inner: decks | (tabs+graph) | queue ─────── */
.frame-inner {
  display: grid;
  grid-template-columns: 320px 1fr 220px;
  gap: 14px;
  align-items: stretch;
}
.frame-decks { display: flex; flex-direction: column; gap: 8px; }
.frame-main { display: flex; flex-direction: column; min-width: 0; }
.mid-band { display: flex; flex: 1; min-height: 0; }
.mid-band .graph-area { flex: 1; min-width: 0; }

/* Graph area */
.graph-area {
  position: relative;
  background: var(--paper);
  border: 1.6px solid var(--ink-2);
  border-radius: 8px;
  min-height: 360px;
  display: flex; flex-direction: column;
}
.graph-area.collapsed { min-height: 56px; }
.graph-area.expanded { min-height: 420px; }
.graph-area.drop-over { border-color: var(--accent); border-style: dashed; box-shadow: 0 0 0 3px var(--accent-soft); }

.show-suggestions {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  background: transparent; border: 0;
  font-size: 16px;
  color: var(--ink-1);
  width: 100%; text-align: left;
}
.ss-mark { color: var(--accent); font-size: 22px; }
.ss-sub { margin-left: auto; font-size: 12px; }

.collapse-handle {
  position: absolute; bottom: 4px; right: 8px;
  background: transparent; border: 0; font-size: 12px;
  color: var(--ink-3);
}

/* ─── Graph header ─── */
.graph-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  border-bottom: 1.4px dashed var(--ink-3);
}
.filter-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 3px 10px;
  background: var(--paper-1);
  border: 1.4px solid var(--ink-2);
  border-radius: 16px / 9px;
  font-size: 12px;
}
.dot-marker { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
.graph-head-right { display: flex; align-items: center; gap: 6px; }
.ghost-btn {
  background: transparent;
  border: 1.4px solid var(--ink-2);
  border-radius: 14px / 7px;
  padding: 2px 9px;
  font-size: 12px;
  color: var(--ink-1);
}
.ghost-btn[disabled] { color: var(--ink-mute); border-color: var(--paper-3); cursor: not-allowed; }
.ghost-btn.gear { font-size: 14px; padding: 2px 8px; }
.page-ind { font-size: 11px; color: var(--ink-2); }

/* ─── Graph stage ─── */
.graph-stage {
  position: relative;
  flex: 1; min-height: 360px;
  overflow: hidden;
}
.edges {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  color: var(--ink-3);
  pointer-events: none;
}
.node-pos {
  position: absolute;
  transform: translate(-50%, -50%);
}

/* ─── Node card ─── */
.node {
  background: var(--paper-1);
  border: 1.5px solid var(--ink-2);
  border-radius: 10px 6px 12px 6px / 6px 12px 6px 10px;
  padding: 6px 8px;
  width: 152px;
  font-size: 13px;
  cursor: grab;
  transition: transform 0.12s, box-shadow 0.12s;
  position: relative;
}
.node:hover {
  transform: translateY(-2px);
  box-shadow: 3px 4px 0 var(--ink-2);
  z-index: 5;
}
.node:active { cursor: grabbing; }
.node-inner { display: grid; grid-template-columns: 36px 1fr auto; gap: 6px; align-items: start; }
.node.is-anchor {
  border-color: var(--accent-stroke);
  border-width: 2.2px;
  background: var(--paper);
  width: 184px;
  box-shadow: 0 0 0 4px var(--accent-soft), 3px 4px 0 var(--accent-stroke);
  cursor: default;
}
.node.is-anchor .node-inner { grid-template-columns: 56px 1fr; }
.node-art { display: flex; }
.node-text { min-width: 0; }
.node-title { font-weight: 700; font-size: 13px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node.is-anchor .node-title { font-size: 16px; }
.node-artist { font-size: 11px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-stats { font-size: 10px; color: var(--ink-2); }

.reason-row { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.reason-chip {
  font-size: 10px;
  padding: 1px 6px;
  background: var(--paper-2);
  border: 1.2px solid var(--ink-3);
  border-radius: 10px / 6px;
  color: var(--ink-2);
  white-space: nowrap;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis;
}
.reason-more { font-size: 10px; }
.anchor-chip {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  padding: 1px 6px;
  background: var(--accent); color: white;
  border-radius: 10px / 6px;
}

.node-explore {
  background: var(--paper);
  border: 1.4px solid var(--ink-2);
  border-radius: 50%;
  width: 22px; height: 22px;
  font-size: 13px; line-height: 1;
  padding: 0;
  color: var(--ink-1);
  align-self: start;
}
.node-explore:hover { background: var(--accent); color: white; border-color: var(--accent-stroke); }

/* density variants */
.density-compact .node { width: 124px; padding: 4px 6px; font-size: 12px; }
.density-compact .node-artist { display: none; }
.density-spacious .node { width: 168px; padding: 8px 10px; }

/* ─── Orbit rings ─── */
.orbit-ring {
  position: absolute;
  border: 1.2px dashed var(--ink-mute);
  border-radius: 50%;
  pointer-events: none;
}
.orbit-label {
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  background: var(--paper);
  padding: 0 6px;
  font-size: 11px;
}

/* ─── Empty state ─── */
.empty-state {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.empty-box { padding: 0; max-width: 320px; text-align: center; }
.empty-box .sketch-content { padding: 20px 24px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.primary-btn {
  background: var(--accent); color: white;
  border: 1.6px solid var(--accent-stroke);
  border-radius: 14px / 8px;
  padding: 6px 14px; font-size: 14px;
  margin-top: 6px;
}

/* ─── Queue strip ─── */
.queue-strip { min-width: 200px; }
.queue-strip.drop-over .sketch-border rect { stroke: var(--accent); stroke-dasharray: 4 4; }
.queue-box { background: var(--paper-2); height: 100%; }
.queue-head { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; padding-bottom: 6px; border-bottom: 1.4px dashed var(--ink-3); margin-bottom: 6px; }
.queue-empty { padding: 12px 4px; font-size: 12px; line-height: 1.3; }
.queue-list { display: flex; flex-direction: column; gap: 6px; }
.queue-card {
  display: grid; grid-template-columns: 32px 1fr; gap: 6px;
  background: var(--paper); padding: 6px 6px 4px;
  border: 1.4px solid var(--ink-2);
  border-radius: 8px 5px 9px 5px / 5px 9px 5px 8px;
  cursor: pointer;
  position: relative;
}
.queue-card:hover { box-shadow: 2px 2px 0 var(--ink-2); }
.queue-card.is-anchor-src { border-color: var(--accent-stroke); border-width: 2px; box-shadow: 0 0 0 3px var(--accent-soft); }
.qc-meta { min-width: 0; }
.qc-title { font-weight: 700; font-size: 12px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qc-actions { grid-column: 1 / -1; display: flex; gap: 3px; margin-top: 4px; }
.row-btn {
  font-size: 11px;
  background: var(--paper-1);
  border: 1.2px solid var(--ink-2);
  border-radius: 10px / 6px;
  padding: 1px 6px;
  color: var(--ink-1);
}
.row-btn:hover { background: var(--accent); color: white; border-color: var(--accent-stroke); }

/* ─── Library ─── */
.library-wrap { margin-top: 18px; }
.library-frame { background: var(--paper-1); }
.library { display: flex; flex-direction: column; gap: 8px; }
.library-head { display: flex; flex-direction: column; gap: 6px; }
.search-row { display: flex; align-items: baseline; gap: 10px; }
.search {
  flex: 1;
  background: var(--paper);
  border: 1.4px solid var(--ink-2);
  border-radius: 14px / 8px;
  padding: 4px 10px;
  font-size: 14px;
  outline: none;
}
.search:focus { border-color: var(--accent-stroke); }
.pill-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.pill {
  background: var(--paper);
  border: 1.4px solid var(--ink-2);
  border-radius: 14px / 8px;
  padding: 2px 9px;
  font-size: 12px;
  color: var(--ink-1);
}
.pill.on { background: var(--accent); color: white; border-color: var(--accent-stroke); }
.pill-sep { width: 1px; height: 16px; background: var(--ink-3); opacity: 0.4; margin: 0 4px; }

.lib-table { display: flex; flex-direction: column; }
.lib-row {
  display: grid;
  grid-template-columns: 30px 1.6fr 1.4fr 60px 50px 1.2fr 1.4fr 50px 40px 130px;
  gap: 8px; align-items: center;
  padding: 4px 6px;
  border-bottom: 1px dotted var(--paper-3);
  font-size: 13px;
}
.lib-row:not(.lib-head-row) { cursor: grab; }
.lib-row:not(.lib-head-row):hover { background: var(--paper-2); }
.lib-row:not(.lib-head-row):active { cursor: grabbing; }
.lib-head-row { font-size: 11px; letter-spacing: 0.1em; text-transform: lowercase; padding-bottom: 6px; border-bottom: 1.4px solid var(--ink-2); }
.c-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-artist, .c-genre, .c-tags { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.c-bpm, .c-key, .c-year, .c-en { font-size: 12px; }
.c-act { display: flex; gap: 3px; justify-content: flex-end; }
.lib-row .c-act { opacity: 0; transition: opacity 0.1s; }
.lib-row:hover .c-act { opacity: 1; }
.lib-scroll { max-height: 280px; overflow-y: auto; }

/* ─── Modal ─── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,16,12,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal { width: 480px; max-width: calc(100% - 40px); }
.modal-box { background: var(--paper); }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1.4px dashed var(--ink-3); }
.modal-section { padding: 8px 0; border-bottom: 1px dotted var(--paper-3); }
.modal-section:last-of-type { border-bottom: 0; }
.crit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-top: 6px; }
.crit-row { display: flex; align-items: center; gap: 6px; font-size: 14px; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.slider { flex: 1; accent-color: var(--accent); }
.slider.focus-flash { animation: flash 0.6s ease-in-out 2; }
@keyframes flash {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-soft); }
  50% { box-shadow: 0 0 0 6px var(--accent-soft); }
}
.num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.num-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.num-row input, .modal-section > input[type="number"] {
  width: 60px;
  background: var(--paper-1);
  border: 1.4px solid var(--ink-2);
  border-radius: 10px / 6px;
  padding: 2px 6px;
  font-family: var(--font-mono); font-size: 13px;
}
.modal-foot { padding-top: 8px; }

/* ─── art ─── */
.art-block { display: block; border-radius: 3px; }
.art-empty { color: var(--ink-mute); }

/* ─── responsive guard ─── */
@media (max-width: 1280px) {
  .app { min-width: 1280px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
